name: Terraform Lint

on:
  push:
    paths:
      - 'terraform/**'

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup terraform linter
        uses: terraform-linters/setup-tflint@v6
      
      - name: Set environment variable
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "ENV=${{ github.event.pull_request.base.ref }}" >> $GITHUB_ENV
          elif [ "${{ github.ref_name }}" == "main" ]; then
            exit 1 
          else 
            echo "ENV=${{ github.ref_name }}" >> $GITHUB_ENV
          fi
      
      - name: Terraform lint version
        run: tflint --version

      - name: Terraform lint init
        run: |
          cd terraform/envs/${{ env.ENV }}
          tflint --init
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run linter
        run: tflint -f compact --chdir=terraform/envs/${{ env.ENV }}

      